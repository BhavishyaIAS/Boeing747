name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      # Dummy values — CI does not connect to a real database. Prisma validate /
      # generate and the (dynamic) Next build only need these to be present.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bhavishya?schema=public
      AUTH_SECRET: ci-placeholder-secret
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit & integration tests
        run: pnpm test

      - name: Production build
        run: pnpm build
