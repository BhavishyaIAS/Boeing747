# Local / self-host stack: Postgres + Redis + one-shot migrate/seed + the app.
#
#   docker compose up --build
#
# The `migrate` service applies migrations, the raw-SQL search/matview files and
# the seed, then exits; `app` starts only after it completes successfully.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bhavishya
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bhavishya"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      target: builder
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bhavishya?schema=public
      DIRECT_URL: postgresql://postgres:postgres@db:5432/bhavishya?schema=public
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pnpm prisma migrate deploy &&
             pnpm prisma db execute --file prisma/sql/001_search.sql --schema prisma/schema.prisma &&
             pnpm prisma db execute --file prisma/sql/002_leaderboard.sql --schema prisma/schema.prisma &&
             pnpm db:seed"
    restart: "no"

  app:
    build:
      context: .
      target: runner
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bhavishya?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-please-change-me-in-production}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-no-reply@bhavishyaias.app}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
